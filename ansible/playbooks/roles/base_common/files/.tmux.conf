# ==============================================================================
# 1. GENERAL SETTINGS
# ==============================================================================
set -g history-limit 50000
# May cause ESC to be less responsive
set -sg escape-time 4000 
set -g repeat-time 1000
set -g default-terminal "tmux-256color"
set -g mouse on

# ==============================================================================
# 2. KEY BINDINGS & NAVIGATION
# ==============================================================================
# Prefix: Ctrl+b -> Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Reload config live
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Number windows/panes from 1, renumber on close
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Splits open in the current pane's directory
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ==============================================================================
# 3. DESIGN & VISUALS (Minimalist Status Bar)
# ==============================================================================
set -g status-style bg=black,fg=white
set -g status-left-length 30
set -g status-left '#[fg=green](#S) '
set -g status-right '#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M'
