service_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGEkMSeG9VVh3Da3ZaLbhfQqQ48WeSqTgvH9bnVWTJ79 svc-ansible@homelab"
service_ssh_public_key_path: "/home/madmin/.ssh/homelab/id_ed25519.pub"
user_admin_account_name: madmin
user_admin_ssh_key_public_key_path: "/home/madmin/.ssh/id_ed25519.pub"

base_common_timezone: "Australia/Melbourne"
base_common_cache_valid_time: 3600
base_common_packages:
  - curl
  - htop
  - git
  - zsh
  - tmux
  - rsync
  - whois
  - openssl
  - xxd
  - needrestart
  - unzip
  - tcpdump
  - jq
  - acl
  - netcat-openbsd
  - pipx
  - icdiff
  - tealdeer
  - unattended-upgrades
  - openssh-client
  - openssh-server

#base_common_pipx_packages:
#  - tldr

zsh_plugins:
  - zsh-autosuggestions
  - zsh-syntax-highlighting

# journald.conf.j2 vars
base_common_journal_max_use: "500M"
base_common_journal_max_file_size: "50M"
base_common_journal_retention: "1month"
# sshd_config.j2 vars
base_common_sshd_PermitRootLogin: "no"
base_common_sshd_MaxAuthTries: "1"
base_common_sshd_PubkeyAuthentication: "yes"
base_common_sshd_PasswordAuthentication: "no"
base_common_sshd_AllowUsers: "{{ user_admin_account_name }} svc-ansible"
